<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>HIIT Timer — Explorations</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@500;600;700&family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; background: #e9e7e1; font-family: 'Inter', sans-serif; }
  #root { height: 100%; }
  button { font-family: inherit; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script>try { localStorage.removeItem('dc-viewport:' + location.pathname); } catch {}</script>
<script src="themes.js"></script>
<script type="text/babel" src="frames/design-canvas.jsx"></script>
<script type="text/babel" src="ring.jsx"></script>
<script type="text/babel" src="themed-core.jsx"></script>
<script type="text/babel" src="themed-layouts.jsx"></script>
<script type="text/babel" src="sessions-screens.jsx"></script>

<script type="text/babel">
  const T = window.THEMES;
  const byKey = (k) => T.find((x) => x.key === k);
  const AW = 286, AH = 588;

  // staggered starts to showcase varied phases
  const STARTS = { tidal: 12, ember: 52, ultraviolet: 95, citrus: 125, daybreak: 250, carbon: 70 };

  function Frame({ children, dark }) {
    return (
      <div style={{
        width: '100%', height: '100%', borderRadius: 30, overflow: 'hidden',
        boxShadow: dark ? '0 18px 50px rgba(0,0,0,0.4), inset 0 0 0 1px rgba(255,255,255,0.06)'
                        : '0 18px 50px rgba(0,0,0,0.18), inset 0 0 0 1px rgba(0,0,0,0.06)',
      }}>{children}</div>
    );
  }

  function App() {
    return (
      <DesignCanvas>
        <DCSection id="schemes" title="Workout Screens" subtitle="Tidal (dark) and Daybreak (light) — running live">
          {T.map((th) => (
            <DCArtboard key={th.key} id={th.key} label={`${th.name} · ${th.note}`} width={AW} height={AH}>
              <Frame dark={th.key !== 'daybreak'}>
                <window.ThemedTimer theme={th} layout="hero" start={STARTS[th.key]} />
              </Frame>
            </DCArtboard>
          ))}
        </DCSection>

        <DCSection id="sessions" title="Session Picker" subtitle="Browse, add and edit HIIT sessions — Tidal (dark) and Daybreak (light)">
          <DCArtboard id="slist-tidal"  label="Sessions List · Tidal"   width={AW} height={AH}>
            <Frame dark><window.SessionsList theme={byKey('tidal')} /></Frame>
          </DCArtboard>
          <DCArtboard id="slist-day"    label="Sessions List · Daybreak" width={AW} height={AH}>
            <Frame dark={false}><window.SessionsList theme={byKey('daybreak')} /></Frame>
          </DCArtboard>
          <DCArtboard id="sedit-tidal"  label="Edit Session · Tidal"     width={AW} height={AH}>
            <Frame dark><window.EditSession theme={byKey('tidal')} /></Frame>
          </DCArtboard>
          <DCArtboard id="sedit-day"    label="Edit Session · Daybreak"  width={AW} height={AH}>
            <Frame dark={false}><window.EditSession theme={byKey('daybreak')} /></Frame>
          </DCArtboard>
        </DCSection>
      </DesignCanvas>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
